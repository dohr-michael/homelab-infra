# frpc — Conan Exiles
# Déployer sur la machine de jeu :
#   sudo cp conan.toml /etc/frp/frpc.toml
#   sudo systemctl enable --now frpc

serverAddr = "${FRP_SERVER}"
serverPort = 7000

auth.method = "token"
auth.token = "${FRP_TOKEN}"

log.to = "/dev/stdout"
log.level = "debug"

[[proxies]]
name = "conan-game-udp"
type = "udp"
localIP = "127.0.0.1"
localPort = 7777
remotePort = 7777
# → conan.dohrm.fr:7777

[[proxies]]
name = "conan-game-tcp"
type = "tcp"
localIP = "127.0.0.1"
localPort = 7777
remotePort = 7777
# → conan.dohrm.fr:7777

[[proxies]]
name = "conan-pinger"
type = "udp"
localIP = "127.0.0.1"
localPort = 7778
remotePort = 7778
# → conan.dohrm.fr:7778 (pinger)

[[proxies]]
name = "conan-query"
type = "udp"
localIP = "127.0.0.1"
localPort = 27015
remotePort = 27015

[[proxies]]
name = "conan-rcon"
type = "tcp"
localIP = "127.0.0.1"
localPort = 25575
remotePort = 25575
# → conan.dohrm.fr:25575 (Steam query)

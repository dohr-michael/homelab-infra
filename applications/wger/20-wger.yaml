---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wger-media-pvc
  namespace: wger
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wger-env
  namespace: wger
data:
  TIME_ZONE: "Europe/Paris"
  TZ: "Europe/Paris"
  # Without nginx, Django DEBUG=True is required for serving /static/ files
  DJANGO_DEBUG: "True"
  DJANGO_MEDIA_ROOT: "/home/wger/media"
  ENABLE_EMAIL: "False"
  WGER_INSTANCE: "https://wger.de"
  ALLOW_REGISTRATION: "False"
  ALLOW_GUEST_USERS: "False"
  ALLOW_UPLOAD_VIDEOS: "True"
  MIN_ACCOUNT_AGE_TO_TRUST: "21"
  # Celery handles sync — disable on-startup sync
  SYNC_EXERCISES_ON_STARTUP: "False"
  DOWNLOAD_EXERCISE_IMAGES_ON_STARTUP: "False"
  USE_CELERY: "True"
  SYNC_EXERCISES_CELERY: "True"
  SYNC_EXERCISE_IMAGES_CELERY: "True"
  SYNC_EXERCISE_VIDEOS_CELERY: "True"
  DOWNLOAD_INGREDIENTS_FROM: "WGER"
  CACHE_API_EXERCISES_CELERY: "True"
  CACHE_API_EXERCISES_CELERY_FORCE_UPDATE: "True"
  CELERY_BROKER: "redis://redis.wger.svc.cluster.local:6379/2"
  CELERY_BACKEND: "redis://redis.wger.svc.cluster.local:6379/2"
  CELERY_WORKER_CONCURRENCY: "2"
  DJANGO_DB_ENGINE: "django.db.backends.postgresql"
  DJANGO_DB_DATABASE: "wger"
  DJANGO_DB_HOST: "postgresql.bdd.svc.cluster.local"
  DJANGO_DB_PORT: "5432"
  DJANGO_PERFORM_MIGRATIONS: "True"
  DJANGO_CACHE_BACKEND: "django_redis.cache.RedisCache"
  DJANGO_CACHE_LOCATION: "redis://redis.wger.svc.cluster.local:6379/1"
  DJANGO_CACHE_TIMEOUT: "1296000"
  DJANGO_CACHE_CLIENT_CLASS: "django_redis.client.DefaultClient"
  EXERCISE_CACHE_TTL: "18000"
  SITE_URL: "https://wger.home.dohrm.fr"
  CSRF_TRUSTED_ORIGINS: "https://wger.home.dohrm.fr,http://wger.home.dohrm.fr,http://127.0.0.1,https://127.0.0.1"
  WGER_PORT: "8000"
  LOG_LEVEL_PYTHON: "INFO"
  USE_RECAPTCHA: "False"
  DJANGO_CLEAR_STATIC_FIRST: "False"
  DJANGO_COLLECTSTATIC_ON_STARTUP: "True"
  ACCESS_TOKEN_LIFETIME: "10"
  REFRESH_TOKEN_LIFETIME: "24"
  AXES_ENABLED: "True"
  AXES_FAILURE_LIMIT: "10"
  AXES_COOLOFF_TIME: "30"
  AXES_HANDLER: "axes.handlers.cache.AxesCacheHandler"
  AXES_LOCKOUT_PARAMETERS: "ip_address"
  AXES_IPWARE_PROXY_COUNT: "1"
  AXES_IPWARE_META_PRECEDENCE_ORDER: "HTTP_X_FORWARDED_FOR,REMOTE_ADDR"
  NUMBER_OF_PROXIES: "1"
  EXPOSE_PROMETHEUS_METRICS: "False"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wger
  namespace: wger
  labels:
    app: wger
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wger
  template:
    metadata:
      labels:
        app: wger
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -zvw10 postgresql.bdd.svc.cluster.local 5432; do
                echo "Waiting for postgres..."; sleep 2
              done
              until nc -zvw10 redis.wger.svc.cluster.local 6379; do
                echo "Waiting for redis..."; sleep 2
              done
      containers:
        - name: wger
          image: wger/server:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: wger-env
          env:
            - name: DJANGO_DB_USER
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: DJANGO_DB_USER
            - name: DJANGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: DJANGO_DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: SECRET_KEY
            - name: SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: SIGNING_KEY
          volumeMounts:
            - name: media
              mountPath: /home/wger/media
          startupProbe:
            httpGet:
              path: /en/user/login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /en/user/login
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /en/user/login
              port: http
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: wger-media-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: wger
  namespace: wger
  labels:
    app: wger
spec:
  type: ClusterIP
  selector:
    app: wger
  ports:
    - name: http
      port: 8000
      targetPort: http

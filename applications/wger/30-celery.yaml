---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: celery-beat-pvc
  namespace: wger
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: wger
  labels:
    app: celery-worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-wger
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -zvw10 postgresql.bdd.svc.cluster.local 5432; do
                echo "Waiting for postgres..."; sleep 2
              done
              until nc -zvw10 redis.wger.svc.cluster.local 6379; do
                echo "Waiting for redis..."; sleep 2
              done
              until wget -q --spider http://wger.wger.svc.cluster.local:8000; do
                echo "Waiting for wger app..."; sleep 5
              done
      containers:
        - name: celery-worker
          image: wger/server:latest
          command: ["/start-worker"]
          envFrom:
            - configMapRef:
                name: wger-env
          env:
            - name: DJANGO_DB_USER
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: DJANGO_DB_USER
            - name: DJANGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: DJANGO_DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: SECRET_KEY
            - name: SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: SIGNING_KEY
          volumeMounts:
            - name: media
              mountPath: /home/wger/media
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: wger-media-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: wger
  labels:
    app: celery-beat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-wger
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -zvw10 postgresql.bdd.svc.cluster.local 5432; do
                echo "Waiting for postgres..."; sleep 2
              done
              until nc -zvw10 redis.wger.svc.cluster.local 6379; do
                echo "Waiting for redis..."; sleep 2
              done
              until wget -q --spider http://wger.wger.svc.cluster.local:8000; do
                echo "Waiting for wger app..."; sleep 5
              done
      containers:
        - name: celery-beat
          image: wger/server:latest
          command: ["/start-beat"]
          envFrom:
            - configMapRef:
                name: wger-env
          env:
            - name: DJANGO_DB_USER
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: DJANGO_DB_USER
            - name: DJANGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: DJANGO_DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: SECRET_KEY
            - name: SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: wger-secrets
                  key: SIGNING_KEY
          volumeMounts:
            - name: beat-data
              mountPath: /home/wger/beat
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: beat-data
          persistentVolumeClaim:
            claimName: celery-beat-pvc

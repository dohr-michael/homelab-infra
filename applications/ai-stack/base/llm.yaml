##############################################################################
# llm-server (ROCm / vLLM)
#
# Image  : kyuz0/vllm-therock-gfx1151:stable
# Backend: ROCm, patches AITER gfx1151 inclus dans l'image
#
# API compatible OpenAI sur le port 8080
# Utilisé via le pattern overlay : 1 overlay = 1 modèle déployé
##############################################################################

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-server-internal-config
  namespace: ai-stack
data:
  # Clés fixes — surchargées par overlay via llm-server-config
  HOST: "0.0.0.0"
  PORT: "8080"
  DTYPE: "auto"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
  namespace: ai-stack
  labels:
    app: llm-server
    component: llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llm-server
  template:
    metadata:
      labels:
        app: llm-server
        component: llm
    spec:
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "ai"
          effect: "NoSchedule"
      nodeSelector:
        gpu-type: "strix-halo"

      initContainers:
        - name: check-model
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              echo "Checking model: $(MODEL_PATH)"
              if [ ! -e "$(MODEL_PATH)" ]; then
                echo "ERROR: not found: $(MODEL_PATH)"
                ls -lh /models/ 2>/dev/null || echo "  (empty)"
                exit 1
              fi
              echo "OK: $(du -sh "$(MODEL_PATH)" | cut -f1)"
          envFrom:
            - configMapRef:
                name: llm-server-config
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true

      containers:
        - name: llm-server
          image: docker.io/kyuz0/vllm-therock-gfx1151:stable
          imagePullPolicy: Always

          command: ["vllm", "serve"]
          args:
            - "$(MODEL_PATH)"
            - "--host"
            - "$(HOST)"
            - "--port"
            - "$(PORT)"
            - "--dtype"
            - "$(DTYPE)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--max-num-seqs"
            - "$(MAX_NUM_SEQS)"
            - "--trust-remote-code"

          envFrom:
            - configMapRef:
                name: llm-server-config
            - configMapRef:
                name: llm-server-internal-config

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          volumeMounts:
            - name: dri
              mountPath: /dev/dri
            - name: kfd
              mountPath: /dev/kfd
            - name: models
              mountPath: /models
              readOnly: true

          # vLLM compile des kernels au premier démarrage → startup lent
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 60
            timeoutSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "16"
              memory: "32Gi"

          # privileged requis : SELinux bloque les allocations mémoire HSA de ROCm
          securityContext:
            privileged: true
            runAsUser: 0

      volumes:
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: kfd
          hostPath:
            path: /dev/kfd
            type: CharDevice
        - name: models
          persistentVolumeClaim:
            claimName: ai-models-llm-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: llm-server
  namespace: ai-stack
  labels:
    app: llm-server
spec:
  type: ClusterIP
  selector:
    app: llm-server
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

##############################################################################
# Ingress — Accès externe (optionnel)
#
# Ajuster les hostnames selon votre DNS/configuration
# Compatible avec Traefik (défaut K3S) et nginx-ingress
##############################################################################

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-stack-ingress
  namespace: ai-stack
  annotations:
    # ── Pour Traefik (défaut K3S) ────────────────────────────
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # ── Pour nginx-ingress (décommenter si utilisé) ──────────
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    # ── Open WebUI ───────────────────────────────────────────
    - host: ai.home.dohrm.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080

    # ── API LLM directe ─────────────────────────────────────
    - host: llm-api.home.dohrm.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gemma4-llm-server
                port:
                  number: 8080
    - host: llm-api-code.home.dohrm.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gemma4-llm-server
                port:
                  number: 8080

    # ── API Embedding directe ────────────────────────────────
    - host: embedding-api.home.dohrm.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nomic-llm-server
                port:
                  number: 8080

    # ── Whisper STT ─────────────────────────────────────────
    - host: stt-api.home.dohrm.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whisper-server
                port:
                  number: 9000

    # ── ComfyUI (Image Gen) ────────────────────────────────
    - host: sd-api.home.dohrm.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sd-server
                port:
                  number: 8000

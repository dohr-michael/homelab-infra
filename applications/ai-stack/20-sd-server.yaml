##############################################################################
# ComfyUI — exposé via Service + Endpoints (pattern headless)
#
# ComfyUI tourne directement sur gmk-ai-master (Strix Halo).
# K8s route le trafic sans gérer de pod.
#
# Port sur le nœud : 8000
##############################################################################

---
apiVersion: v1
kind: Service
metadata:
  name: sd-server
  namespace: ai-stack
  labels:
    app: sd-server
    component: image-gen
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
apiVersion: v1
kind: Endpoints
metadata:
  name: sd-server
  namespace: ai-stack
subsets:
  - addresses:
      - ip: 100.64.0.4   # gmk-ai-master (IP Headscale)
    ports:
      - name: http
        port: 8000
        protocol: TCP

##############################################################################
# Stockage persistant pour les modèles LLM
# Les modèles GGUF sont stockés sur le noeud Strix Halo dans /srv/ai-models/llm
#
# (La partie diffusion a été retirée : sd-server/ComfyUI tourne désormais
#  hors cluster, voir 20-sd-server.yaml — pattern headless.)
##############################################################################

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-ai
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ai-models-llm-pv
  labels:
    type: local
    app: llama-server
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-ai
  local:
    path: /srv/ai-models/llm
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: gpu-type
              operator: In
              values:
                - strix-halo

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-models-llm-pvc
  namespace: ai-stack
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-ai
  resources:
    requests:
      storage: 200Gi
  selector:
    matchLabels:
      app: llama-server

##############################################################################
# Voxtral STT Server — Transcription audio + compréhension audio
#
# Modèle : mistralai/Voxtral-Mini-3B-2507 (~10 Go VRAM, format HF)
# Backend : vLLM (kyuz0/vllm-therock-gfx1151:stable) sur Strix Halo
#
# Prérequis sur le noeud :
#   huggingface-cli download mistralai/Voxtral-Mini-3B-2507 \
#     --local-dir /srv/ai-models/llm/voxtral-mini-3b/
#
# API compatible OpenAI sur le port 9001
#   POST /v1/audio/transcriptions — transcription (OpenAI-compatible)
##############################################################################

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voxtral-server
  namespace: ai-stack
  labels:
    app: voxtral-server
    component: stt
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: voxtral-server
  template:
    metadata:
      labels:
        app: voxtral-server
        component: stt
    spec:
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "ai"
          effect: "NoSchedule"
      nodeSelector:
        gpu-type: "strix-halo"

      initContainers:
        - name: check-model
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              MODEL=/models/voxtral-mini-3b
              echo "Checking model directory: $MODEL"
              if [ ! -d "$MODEL" ]; then
                echo "ERROR: $MODEL not found"
                echo "Run: huggingface-cli download mistralai/Voxtral-Mini-3B-2507 --local-dir /srv/ai-models/llm/voxtral-mini-3b/"
                exit 1
              fi
              echo "OK: $(du -sh $MODEL | cut -f1)"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true

      containers:
        - name: voxtral-server
          image: docker.io/kyuz0/vllm-therock-gfx1151:stable
          imagePullPolicy: Always

          command: ["vllm", "serve"]
          args:
            - "/models/voxtral-mini-3b"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "9001"
            - "--dtype"
            - "auto"
            - "--gpu-memory-utilization"
            - "0.15"
            - "--max-model-len"
            - "32768"
            - "--tokenizer_mode"
            - "mistral"
            - "--config_format"
            - "mistral"
            - "--load_format"
            - "mistral"
            - "--served-model-name"
            - "voxtral-mini-3b"

          ports:
            - name: http
              containerPort: 9001
              protocol: TCP

          volumeMounts:
            - name: dri
              mountPath: /dev/dri
            - name: kfd
              mountPath: /dev/kfd
            - name: models
              mountPath: /models
              readOnly: true

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 40
            timeoutSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "8"
              memory: "16Gi"

          # privileged requis : SELinux bloque les allocations mémoire HSA de ROCm
          securityContext:
            privileged: true
            runAsUser: 0

      volumes:
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: kfd
          hostPath:
            path: /dev/kfd
            type: CharDevice
        - name: models
          persistentVolumeClaim:
            claimName: ai-models-llm-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: voxtral-server
  namespace: ai-stack
  labels:
    app: voxtral-server
    component: stt
spec:
  type: ClusterIP
  selector:
    app: voxtral-server
  ports:
    - name: http
      port: 9001
      targetPort: http
      protocol: TCP

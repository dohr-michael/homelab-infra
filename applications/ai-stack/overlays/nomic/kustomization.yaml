resources:
  - ../../base

labels:
  - includeSelectors: true
    pairs:
      app: nomic-embed
namePrefix: nomic-

# Télécharger le modèle HF :
#   huggingface-cli download nomic-ai/nomic-embed-text-v1.5 \
#     --local-dir /srv/ai-models/llm/nomic-embed-text-v1.5/

configMapGenerator:
  - name: llm-server-config
    literals:
      - MODEL_PATH="/models/nomic-embed-text-v1.5"
      - MAX_MODEL_LEN="2048"
      - MAX_NUM_SEQS="32"
      # Modèle tiny (~137M) — utilisation mémoire négligeable
      - GPU_MEMORY_UTILIZATION="0.05"

patches:
  - target:
      kind: Deployment
      name: llm-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: '--task'
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: 'embed'

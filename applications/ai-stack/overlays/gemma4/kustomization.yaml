resources:
  - ../../base

labels:
  - includeSelectors: true
    pairs:
      app: gemma4-26b

namePrefix: gemma4-

configMapGenerator:
  - name: llm-server-config
    literals:
      - MODEL_PATH="/models/gemma-4-26B-A4B-it-Q4_K_M.gguf"
      - MAX_MODEL_LEN="65536"
      - MAX_NUM_SEQS="4"
      # ~0.40 × 64 Go UMA = 25 Go réservés (14 Go poids + 11 Go KV cache)
      # Ajuster si d'autres modèles vLLM tournent simultanément
      - GPU_MEMORY_UTILIZATION="0.40"
